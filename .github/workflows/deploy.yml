name: Deploy

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🏗️ Build application
      run: npm run build
    
    - name: 🐳 Build and tag Docker image
      run: |
        docker build -t weatheria:${{ github.sha }} .
        docker tag weatheria:${{ github.sha }} weatheria:latest
    
    - name: ✅ Verify Docker image
      run: |
        docker run --rm weatheria:latest echo "✅ Docker image verified"
    
    - name: 🎉 Deployment ready
      run: |
        echo "✅ Application is ready for deployment"
        echo "Image: weatheria:${{ github.sha }}"
        echo "Latest tag: weatheria:latest"
